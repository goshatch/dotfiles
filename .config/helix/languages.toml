[[language]]
name = "ruby"
scope = "source.rb"
injection-regex = "ruby"
file-types = ["rb", "rake", "ru", "gemspec", "jbuilder"]
roots = ["Gemfile", ".git"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "markdown"

[language.soft-wrap]
enable = true
wrap-at-text-width = true

[[language]]
name = "haskell"
scope = "source.hs"
auto-format = true

[[language]]
name = "brossa"
scope = "source.brossa"
injection-regex = "brossa"
file-types = ["art", "tart"]
comment-token = "//"
indent = { tab-width = 2, unit = "  " }
language-servers = ["brossa-lsp"]

[language-server.brossa-lsp]
command = "brossa-lsp-server"

[[grammar]]
name = "brossa"
# IMPORTANT: Update this path to your local tree-sitter-brossa directory
# TOML doesn't support ~ or $HOME, so use the full absolute path
source = { path = "/Users/gosha/repos/brossa/tools/tree-sitter-brossa" }
